# PuliziaCassaforte runtime configuration
# Deploy alongside PuliziaCassaforte.groovy or pass path as 4th argument.

# Build map client: 'json' (file-based) or 'db2' (live DBB metadatastore)
buildMapClientType=db2

# DB2 credentials (required when buildMapClientType=db2)
#userId=
#pwFilePath=
#db2ConfigPath=

# JSON build map file (required when buildMapClientType=json)
#buildMapPath=build-data/buildmap.json

# File operations: 'zos' (USS) or 'local' (test only)
fileOpsType=zos

# HLQ prefix for library name resolution (optional)
#hlq=

# Path to deletion rules CSV
rulesPath=build-data/rules.csv

# Path to stage-map CSV
stageMapPath=build-data/stage-map.csv

# Comma-separated list of jobz/jobs file extensions (uppercase).
# Paths with these extensions bypass repository-name parsing; layer operativo defaults to '01'.
# For the S action, restore copies into the current environment's cassaforte library (no TOCOLB).
jobzExtensions=STWSNCS
