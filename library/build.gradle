// Build:
//  ./gradlew :library:clean :library:build

plugins {
    id 'groovy'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

configurations {
    // stub inherits Groovy (and other impl deps) so compileStubGroovy can resolve Groovy jar
    stubImplementation.extendsFrom(implementation)
}

sourceSets {
    // Minimal stub classes for IBM/JZOS deps — compile-time only, never packaged.
    stub {
        java { srcDirs = ['src/stub/java'] }
    }
    main {
        groovy {
            srcDirs = ['src/main/groovy']
            compileClasspath += sourceSets.stub.output
        }
    }
    test {
        groovy {
            srcDirs = ['src/test/groovy']
        }
    }
}

dependencies {
    implementation 'org.apache.groovy:groovy-all:4.0.25'
    implementation 'org.slf4j:slf4j-api:2.0.16'
    testImplementation 'org.spockframework:spock-core:2.3-groovy-4.0'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.4'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.10.2'
    testRuntimeOnly 'ch.qos.logback:logback-classic:1.5.15'
}

test {
    useJUnitPlatform()
    outputs.upToDateWhen { false }
}

jar {
    archiveBaseName = 'pulizia-cassaforte'
}

